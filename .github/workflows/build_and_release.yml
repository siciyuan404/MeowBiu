name: 构建和发布

on:
  push:
    tags:
      - 'v*' # 当推送标签如 v1.0.0 时触发
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: 构建Android版本
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            build/
          key: ${{ runner.os }}-pub-android-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-android-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建Debug APK
        if: github.event.inputs.build_type == 'debug'
        run: flutter build apk --debug
      
      - name: 构建Release APK
        if: github.event.inputs.build_type == 'release'
        run: flutter build apk --release
      
      - name: 上传Debug APK
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-debug-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 5
      
      - name: 构建Release APK (ARM64)
        if: github.event.inputs.build_type == 'release'
        run: flutter build apk --release --target-platform android-arm64
      
      - name: 创建Release
        if: github.inputs.build_type == 'release'
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-*.apk
          name: 喵币 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: 构建iOS版本
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            ios/Pods/
            build/
          key: ${{ runner.os }}-pub-ios-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-ios-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 安装 iOS 依赖
        run: |
          cd ios
          # 设置 pod 镜像源（使用国内镜像解决 404 问题）
          pod repo remove trunk
          pod repo add trunk https://cdn.cocoapods.org/
          
          # 重试机制：最多重试 3 次
          for i in 1 2 3; do
            echo "尝试 $i/3..."
            pod install --repo-update && break
            echo "重试中..."
            sleep 10
          done
      
      - name: 构建iOS应用
        run: |
          flutter build ios --release --no-codesign
          cd ios
          mkdir -p build/archive
      
      - name: 上传iOS构建结果
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/
          retention-days: 5
