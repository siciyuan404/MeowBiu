name: 构建和发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: 构建Android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            build/
          key: ${{ runner.os }}-pub-android-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-android-
      
      - name: 获取依赖
        run: |
          flutter pub get
      
      - name: 设置Gradle内存
        run: |
          echo "GRADLE_OPTS=-Xmx8g -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" >> $GITHUB_ENV
          # 限制Gradle并行任务数量，减少内存占用
          echo "GRADLE_MAX_WORKERS=2" >> $GITHUB_ENV
      
      - name: 构建Debug APK
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug'
        run: flutter build apk --debug --target-platform android-arm64
      
      - name: 构建Release APK
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release') || startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release --split-per-abi
      
      - name: 上传Debug APK
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-debug-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 5
      
      - name: 上传Release APK
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release') || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-release-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 30
      
      - name: 创建Release
        if: (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release') || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*.apk
          name: 喵币 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
