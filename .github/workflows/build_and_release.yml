name: 构建和发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: 构建Android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            build/
          key: ${{ runner.os }}-pub-android-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-android-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 设置Gradle内存
        run: |
          echo "GRADLE_OPTS=-Xmx4g -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" >> $GITHUB_ENV
      
      - name: 构建Debug APK
        if: github.event.inputs.build_type == 'debug'
        run: flutter build apk --debug
      
      - name: 构建Release APK
        if: github.event.inputs.build_type == 'release'
        run: flutter build apk --release --split-per-abi
      
      - name: 上传Debug APK
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-debug-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 5
      
      - name: 上传Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-release-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 30
      
      - name: 创建Release
        if: github.event.inputs.build_type == 'release' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*.apk
          name: 喵币 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: 构建iOS
    runs-on: macos-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            ios/Pods/
          key: ${{ runner.os }}-pub-ios-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-ios-
      
      - name: 获取依赖
        run: flutter pub get

      - name: 配置iOS Pod镜像
        run: |
          cd ios
          # 检查 trunk 是否存在，存在则移除
          if pod repo list | grep -q "trunk"; then
            pod repo remove trunk || true
          fi
          # 添加镜像源
          pod repo add trunk https://cdn.cocoapods.org/ || true
      
      - name: 安装iOS依赖
        run: |
          cd ios
          # 重试机制：最多重试 3 次
          for i in 1 2 3; do
            echo "尝试 $i/3..."
            pod install --repo-update && break
            if [ $i -lt 3 ]; then
              echo "重试中..."
              sleep 30
            fi
          done
      
      - name: 安装iOS依赖
        run: cd ios && pod install --repo-update
        timeout-minutes: 30
      
      - name: 构建iOS
        run: flutter build ios --release --no-codesign
      
      - name: 上传iOS构建结果
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/
          retention-days: 5
