name: 构建Debug APK

on:
  workflow_dispatch:

jobs:
  build-android:
    name: 构建Android Debug版本
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            build/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 修复 ffmpeg_kit_flutter AndroidManifest 问题
        run: |
          # 找到并修复 ffmpeg_kit_flutter_full_gpl 的 AndroidManifest.xml
          MANIFEST_PATH=$(find ~/.pub-cache -name "AndroidManifest.xml" -path "*ffmpeg_kit_flutter_full_gpl*" 2>/dev/null | head -1)
          if [ -n "$MANIFEST_PATH" ] && [ -f "$MANIFEST_PATH" ]; then
            echo "修复 AndroidManifest.xml: $MANIFEST_PATH"
            # 移除过时的 package 属性
            sed -i 's/package="com.arthenica.ffmpegkit.flutter"//g' "$MANIFEST_PATH"
          fi
      
      - name: 构建Debug APK
        run: flutter build apk --debug
      
      - name: 上传Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-debug-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 7
