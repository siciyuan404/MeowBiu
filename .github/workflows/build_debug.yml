name: 构建Debug APK

on:
  workflow_dispatch:

jobs:
  build-android:
    name: 构建Android Debug版本
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            build/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 修复 ffmpeg_kit_flutter AndroidManifest 问题
        run: |
          echo "=== 开始修复 ffmpeg_kit_flutter AndroidManifest ==="
          
          # 删除缓存并重新获取依赖（确保使用最新版本）
          rm -rf ~/.pub-cache/hosted/pub.dev/ffmpeg_kit_flutter_full_gpl*
          echo "已删除旧的缓存"
          
          # 手动下载 ffmpeg_kit_flutter_full_gpl
          cd /tmp
          flutter pub cache add ffmpeg_kit_flutter_full_gpl:^5.1.0 2>/dev/null || true
          
          # 找到 AndroidManifest.xml 并修复
          MANIFEST_PATH=$(find ~/.pub-cache -name "AndroidManifest.xml" -path "*ffmpeg_kit_flutter_full_gpl*" 2>/dev/null | head -1)
          if [ -n "$MANIFEST_PATH" ] && [ -f "$MANIFEST_PATH" ]; then
            echo "修复 AndroidManifest.xml: $MANIFEST_PATH"
            # 移除过时的 package 属性
            sed -i 's/package="com.arthenica.ffmpegkit.flutter"//g' "$MANIFEST_PATH"
            echo "修复后的前5行:"
            head -5 "$MANIFEST_PATH"
          else
            echo "警告: 未找到 AndroidManifest.xml"
          fi
          
          echo "=== 修复完成 ==="
      
      - name: 构建Debug APK
        run: flutter build apk --debug
      
      - name: 上传Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: meowbiu-debug-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 7
