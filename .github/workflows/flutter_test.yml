name: Flutter测试

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  analyze:
    name: 代码分析
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 格式化代码
        run: dart format .
      
      - name: 检查代码格式
        run: dart format --set-exit-if-changed .
      
      - name: 代码分析
        run: flutter analyze

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 运行测试
        run: flutter test

  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
      
      - name: 缓存Pub依赖
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool/
            build/
          key: ${{ runner.os }}-pub-build-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-build-
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建Debug APK
        run: flutter build apk --debug
